# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
minimal_mistakes_skin    : "dark" # "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale                   : "en-US"
title                    : "Nathan Pflueger's academic website"
title_separator          : "-"
name                     : "Nathan Pflueger"
description              : "Nathan Pflueger's academic website"
url                      : "https://npflueger.github.io"
baseurl                  : "/"
logo                     : "/files/disp3.png"
masthead_title           : "Home"

# Analytics
analytics:
  provider               : "google-gtag"
  google:
    tracking_id          : "G-5EWH14XYK9"
    anonymize_ip         : false


# Site Author
author:
  name             : "Nathan Pflueger"
  avatar           : /files/headshot.jpg
  bio              : "Associate Professor of Mathematics"
  location         : "Amherst, MA"
  email            : "npflueger@amherst.edu"


# Reading Files
include:
  - .htaccess
  - _pages
  - _includes
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - log
  - node_modules
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: America/New_York


# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-redirect-from

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: #all
  ignore:
    envs: development


# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: course
      author_profile: true
      toc: true
  # _psets
  - scope:
      path: ""
      type: psets
    values:
      layout: pset
      author_profile: false
      toc: false

# Collections
collections:
  teaching:
    output: true
  helphours:
    output: false
  psets:
    output: true

footer:
  logo: "files/chain.png"
  links:
    - label: "Amherst College"
      url: https://www.amherst.edu
    - label: "Dept. of Math and Stats"
      url: http://www.amherst.edu/academiclife/departments/mathematics-statistics
