<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Titanic Trail</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #020210;
  font-family: Georgia, 'Times New Roman', serif;
  color: #dcd2b4;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  width: 820px;
  height: 620px;
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  overflow: hidden;
  background: #051941;
}

/* ── Buttons ── */
button {
  font-family: Georgia, serif;
  cursor: pointer;
  touch-action: manipulation;
  border: 1px solid #d4af37;
  color: #fff8d7;
  background: #122650;
  padding: 6px 16px;
  font-size: 13px;
  transition: background 0.15s;
}
button:hover:not(:disabled) { background: #1e3a78; }
button:disabled { opacity: 0.45; cursor: default; }
button.btn-green  { background: #284e28; }
button.btn-green:hover:not(:disabled) { background: #376637; }
button.btn-amber  { background: #4a3210; }
button.btn-amber:hover:not(:disabled) { background: #5e4018; }
button.btn-teal   { background: #103c3c; }
button.btn-teal:hover:not(:disabled) { background: #174f4f; }
button.btn-red    { background: #501818; }
button.btn-red:hover:not(:disabled)  { background: #681e1e; }
button.btn-large  { font-size: 16px; padding: 8px 22px; }

/* ── Modal ── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#modal-overlay.hidden { display: none; }
#modal-box {
  background: #0d1e48;
  border: 2px solid #d4af37;
  padding: 24px 30px;
  max-width: 420px;
  width: 90%;
  text-align: center;
}
#modal-title {
  font-size: 20px;
  font-weight: bold;
  color: #d4af37;
  margin-bottom: 12px;
}
#modal-body {
  font-size: 14px;
  line-height: 1.6;
  color: #dcd2b4;
  margin-bottom: 18px;
  white-space: pre-wrap;
}
#modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── Setup Screen ── */
#setup-screen {
  width: 820px; height: 620px;
  background: #051941;
  display: flex; flex-direction: column;
  padding: 20px 30px;
}
.setup-title {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  color: #d4af37;
  margin-bottom: 14px;
}
.setup-cols { display: flex; gap: 20px; flex: 1; overflow: hidden; }
.setup-col { flex: 1; display: flex; flex-direction: column; }
.section-label {
  font-size: 16px; font-weight: bold; color: #d4af37;
  margin-bottom: 8px;
}
.class-card {
  border: 1px solid #2e4080;
  background: #0d1e48;
  padding: 8px 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.class-card.selected { background: #152a60; border-color: #d4af37; }
.class-card label { cursor: pointer; display: block; }
.class-card .class-name { font-weight: bold; font-size: 14px; color: #fff8d7; }
.class-card.cls-1 .class-name { color: #d4af37; }
.class-card.cls-3 .class-name { color: #8c8472; }
.class-card .class-detail { font-size: 11px; color: #8c8472; margin-top: 3px; line-height: 1.4; padding-left: 20px; }
.class-card input[type=radio] { margin-right: 6px; accent-color: #d4af37; }

.name-row {
  display: flex; align-items: center; margin-bottom: 6px; gap: 8px;
}
.name-row label { font-size: 13px; width: 80px; color: #dcd2b4; flex-shrink: 0; }
.name-row label.leader { color: #d4af37; font-weight: bold; }
.name-row input {
  background: #0d1e48; border: 1px solid #d4af37;
  color: #fff8d7; font-family: Georgia, serif;
  font-size: 13px; padding: 4px 8px; width: 180px;
}
.name-row input:focus { outline: none; border-color: #f0d060; }
.hint { font-size: 12px; font-style: italic; color: #6a6050; margin-bottom: 10px; }
.hist-note { font-size: 11px; font-style: italic; color: #5a5444; margin-top: auto; }
.setup-bottom { display: flex; justify-content: center; padding-top: 14px; }

/* ── Voyage Screen ── */
#voyage-screen {
  width: 820px; height: 620px;
  background: #051941;
  display: flex; flex-direction: column;
}
#map-strip {
  height: 75px; width: 100%;
  flex-shrink: 0;
  border-bottom: 1px solid #d4af37;
}
#voyage-main { display: flex; flex: 1; overflow: hidden; }
#log-panel {
  flex: 1;
  background: #040f2e;
  border-right: 1px solid #1a2e60;
  overflow-y: auto;
  padding: 8px 12px;
  font-size: 13px;
  line-height: 1.6;
  color: #c8c0a0;
}
#log-panel p { margin-bottom: 4px; }
#log-panel p.alert { color: #e05050; }
#log-panel p.good  { color: #50c070; }
#log-panel p.gold  { color: #d4af37; }
#status-panel {
  width: 200px; flex-shrink: 0;
  background: #0d1e48;
  padding: 10px 12px;
  font-size: 12px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 2px;
}
.status-date { font-size: 13px; font-weight: bold; color: #d4af37; }
.status-loc  { font-size: 11px; font-style: italic; color: #dcd2b4; margin-bottom: 6px; }
.status-sep  { font-size: 10px; color: #5a5444; text-align: center; margin: 4px 0 2px; letter-spacing: 1px; }
.status-row  { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 1px; }
.status-row .val { font-weight: bold; }
.status-row .val.ok   { color: #50c070; }
.status-row .val.warn { color: #d4af37; }
.status-row .val.bad  { color: #e05050; }
.pax-row { font-size: 11px; margin-bottom: 1px; }
.pax-row.dead { color: #5a5444; }
.settings-val { font-size: 11px; color: #8c8472; margin-bottom: 1px; }
#voyage-btns {
  padding: 6px 8px;
  display: flex; flex-wrap: wrap; gap: 6px;
  border-top: 1px solid #1a2e60;
  background: #040f2e;
  justify-content: center;
}

/* ── Store Screen ── */
#store-screen {
  width: 820px; height: 620px;
  background: #051941;
  display: flex; flex-direction: column;
  padding: 20px 30px;
}
.store-title { font-size: 26px; font-weight: bold; color: #d4af37; text-align: center; margin-bottom: 14px; }
.store-cols  { display: flex; gap: 20px; flex: 1; }
.store-col   { flex: 1; background: #0d1e48; border: 1px solid #d4af37; padding: 14px 16px; }
.store-col-title { font-size: 17px; font-weight: bold; color: #d4af37; margin-bottom: 10px; }
.store-item  { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.store-item label { font-size: 13px; color: #dcd2b4; }
.store-item .price { font-size: 12px; color: #8c8472; }
.store-money { font-size: 15px; font-weight: bold; color: #d4af37; margin-bottom: 12px; }
.store-stat  { font-size: 13px; margin-bottom: 4px; }
.store-note  { font-size: 12px; font-style: italic; color: #5a5444; margin-top: 12px; }
.store-bottom { display: flex; justify-content: center; padding-top: 14px; }

/* ── Ending Screen ── */
#ending-screen {
  width: 820px; height: 620px;
  background: #051941;
  overflow-y: auto;
  padding: 24px 50px;
  display: flex; flex-direction: column; align-items: center;
}
.ending-title { font-size: 30px; font-weight: bold; text-align: center; margin-bottom: 16px; }
.ending-title.sunk { color: #be2828; }
.ending-title.safe { color: #d4af37; }
.ending-narrative { font-size: 14px; line-height: 1.7; text-align: center; max-width: 600px; margin-bottom: 20px; color: #dcd2b4; }
.ending-stats { background: #0d1e48; border: 1px solid #d4af37; padding: 14px 24px; width: 100%; max-width: 460px; margin-bottom: 18px; }
.ending-stats table { width: 100%; border-collapse: collapse; }
.ending-stats td { padding: 3px 8px; font-size: 13px; }
.ending-stats td:first-child { color: #8c8472; font-weight: bold; }
.ending-stats td:last-child  { color: #fff8d7; }
.ending-hist { font-size: 12px; font-style: italic; color: #5a5444; text-align: center; max-width: 580px; margin-bottom: 18px; line-height: 1.6; }
.ending-btns { display: flex; gap: 16px; }

.score-panel {
  background: #0a1530;
  border: 2px solid #d4af37;
  padding: 16px 26px;
  text-align: center;
  width: 100%; max-width: 460px;
  margin-bottom: 14px;
}
.score-number { font-size: 54px; font-weight: bold; color: #d4af37; line-height: 1.05; letter-spacing: 2px; }
.score-rating { font-size: 19px; color: #fff8d7; margin: 4px 0 12px; font-style: italic; }
.score-divider { border: none; border-top: 1px solid #2a3860; margin: 8px 0; }
.score-breakdown { width: 100%; }
.score-breakdown td { font-size: 12px; padding: 2px 4px; }
.score-breakdown td:first-child { color: #8c8472; text-align: left; }
.score-breakdown td:last-child  { text-align: right; font-weight: bold; min-width: 60px; }
.score-breakdown td.pos { color: #50c070; }
.score-breakdown td.neg { color: #e05050; }
.score-breakdown td.mult{ color: #d4af37; }
.score-breakdown tr.total-row td { border-top: 1px solid #2a3860; padding-top: 5px; color: #d4af37; font-size: 13px; }
</style>
</head>
<body>
<div id="app"></div>

<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-btns"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
